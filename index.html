<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code · Skills & MCP 全景仪表盘</title>
<style>
  /* ══════════════════════════════════════════════════
     CSS 变量与重置
     ══════════════════════════════════════════════════ */
  :root {
    --bg-base: #0b0d12;
    --bg-surface: #11141c;
    --bg-card: #171b26;
    --bg-card-hover: #1d2232;
    --border-subtle: #1e2538;
    --border-accent: #2a3555;
    --text-primary: #e8edf5;
    --text-secondary: #8892a8;
    --text-tertiary: #5a6480;
    --cyan: #5dd8f9;
    --cyan-dim: rgba(93, 216, 249, 0.08);
    --cyan-glow: rgba(93, 216, 249, 0.25);
    --purple: #a78bfa;
    --purple-dim: rgba(167, 139, 250, 0.08);
    --purple-glow: rgba(167, 139, 250, 0.20);
    --emerald: #4ade80;
    --emerald-dim: rgba(74, 222, 128, 0.08);
    --amber: #fbbf24;
    --amber-dim: rgba(251, 191, 36, 0.08);
    --rose: #fb7185;
    --rose-dim: rgba(251, 113, 133, 0.08);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --shadow-card: 0 2px 24px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.3);
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-base);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══════════════════════════════════════════════════
     背景网格 + 光晕
     ══════════════════════════════════════════════════ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border-subtle) 1px, transparent 1px),
      linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0, black 30%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0, black 30%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -40vh; left: 50%;
    width: 80vmax; height: 80vmax;
    background: radial-gradient(circle, var(--cyan-glow) 0%, transparent 65%);
    transform: translate(-50%, 0);
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  /* ══════════════════════════════════════════════════
     滚动条
     ══════════════════════════════════════════════════ */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

  /* ══════════════════════════════════════════════════
     布局
     ══════════════════════════════════════════════════ */
  .app { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 0 40px 80px; }

  /* ══════════════════════════════════════════════════
     Header
     ══════════════════════════════════════════════════ */
  header {
    padding: 64px 0 48px;
    text-align: center;
    position: relative;
  }
  header .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid var(--border-accent);
    background: rgba(42, 53, 85, 0.3);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 20px;
    backdrop-filter: blur(4px);
  }
  header .badge .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--emerald);
    box-shadow: 0 0 8px var(--emerald);
  }
  header h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f4ff 0%, var(--cyan) 50%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    margin-top: 14px;
    font-size: 1.1rem;
    color: var(--text-secondary);
    max-width: 600px;
    margin-inline: auto;
  }

  /* ══════════════════════════════════════════════════
     摘要统计条
     ══════════════════════════════════════════════════ */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 56px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 20px 24px;
    text-align: center;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--border-accent); }
  .stat-card .num {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--cyan);
  }
  .stat-card .label {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* ══════════════════════════════════════════════════
     MCP 服务横幅
     ══════════════════════════════════════════════════ */
  .mcp-section {
    margin-bottom: 56px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .section-header .icon {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }
  .section-header .icon.cyan  { background: var(--cyan-dim);  color: var(--cyan); }
  .section-header .icon.purple{ background: var(--purple-dim); color: var(--purple); }
  .section-header .icon.emerald{background:var(--emerald-dim);color:var(--emerald);}
  .section-header .icon.amber { background: var(--amber-dim);  color: var(--amber); }
  .section-header .icon.rose  { background: var(--rose-dim);  color: var(--rose); }
  .section-header h2 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .section-header .count {
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--text-tertiary);
    background: var(--bg-card);
    padding: 2px 12px;
    border-radius: 100px;
    border: 1px solid var(--border-subtle);
  }

  .mcp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 14px;
  }
  .mcp-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 20px 24px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: border-color .2s, box-shadow .2s;
  }
  .mcp-card:hover {
    border-color: var(--border-accent);
    box-shadow: 0 0 20px rgba(93,216,249,0.06);
  }
  .mcp-card .mcp-icon {
    width: 42px; height: 42px; min-width: 42px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    border: 1px solid var(--border-subtle);
    background: var(--bg-surface);
  }
  .mcp-card .mcp-body { flex: 1; min-width: 0; }
  .mcp-card .mcp-body h3 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .mcp-card .mcp-body .cmd {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-tertiary);
    background: var(--bg-base);
    padding: 3px 10px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 6px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    border: 1px solid var(--border-subtle);
  }
  .mcp-card .mcp-body .desc {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* ══════════════════════════════════════════════════
     Skills 分类
     ══════════════════════════════════════════════════ */
  .skills-section { margin-bottom: 48px; }

  .skill-category {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 20px;
    transition: border-color .2s;
  }
  .skill-category:hover { border-color: var(--border-accent); }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .cat-header:hover { background: rgba(255,255,255,0.015); }
  .cat-header .chevron {
    font-size: 0.7rem;
    color: var(--text-tertiary);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .cat-header .chevron.open { transform: rotate(90deg); }
  .cat-header h3 { font-size: 0.95rem; font-weight: 600; }
  .cat-header .cat-count {
    font-size: 0.72rem;
    color: var(--text-tertiary);
    background: var(--bg-card);
    padding: 1px 10px;
    border-radius: 100px;
  }

  .cat-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .45s cubic-bezier(.4,0,.2,1);
  }
  .cat-body.open { max-height: 20000px; }

  .skill-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
    padding: 0 24px 20px;
  }

  .skill-item {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    transition: border-color .2s, background .2s, transform .15s;
    cursor: default;
  }
  .skill-item:hover {
    border-color: var(--border-accent);
    background: var(--bg-card-hover);
    transform: translateY(-1px);
  }
  .skill-item .sk-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-primary);
    font-family: var(--font-mono);
  }
  .skill-item .sk-desc {
    font-size: 0.76rem;
    color: var(--text-secondary);
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.45;
  }

  /* ══════════════════════════════════════════════════
     搜索
     ══════════════════════════════════════════════════ */
  .search-bar {
    position: relative;
    max-width: 420px;
    margin: 0 auto 40px;
  }
  .search-bar input {
    width: 100%;
    padding: 12px 18px 12px 44px;
    border-radius: 100px;
    border: 1px solid var(--border-subtle);
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 0.88rem;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
  }
  .search-bar input:focus {
    border-color: var(--border-accent);
    box-shadow: 0 0 0 3px rgba(93,216,249,0.08);
  }
  .search-bar input::placeholder { color: var(--text-tertiary); }
  .search-bar .search-icon {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    font-size: 0.9rem;
    pointer-events: none;
  }

  /* ══════════════════════════════════════════════════
     空状态
     ══════════════════════════════════════════════════ */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-tertiary);
    display: none;
  }
  .empty-state.show { display: block; }
  .empty-state .empty-icon { font-size: 2.4rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  /* ══════════════════════════════════════════════════
     Footer
     ══════════════════════════════════════════════════ */
  footer {
    text-align: center;
    padding: 40px 0 20px;
    border-top: 1px solid var(--border-subtle);
    color: var(--text-tertiary);
    font-size: 0.78rem;
  }
  footer .time { color: var(--text-secondary); }

  /* ══════════════════════════════════════════════════
     响应式
     ══════════════════════════════════════════════════ */
  @media (max-width: 768px) {
    .app { padding: 0 16px 60px; }
    header { padding: 40px 0 32px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .skill-list { grid-template-columns: 1fr; padding: 0 16px 16px; }
    .cat-header { padding: 14px 16px; }
    .mcp-grid { grid-template-columns: 1fr; }
  }

  /* ══════════════════════════════════════════════════
     动画 — 入场
     ══════════════════════════════════════════════════ */
  .fade-in {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp .5s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .fade-in:nth-child(1) { animation-delay: 0.02s; }
  .fade-in:nth-child(2) { animation-delay: 0.06s; }
  .fade-in:nth-child(3) { animation-delay: 0.10s; }
  .fade-in:nth-child(4) { animation-delay: 0.14s; }
  .fade-in:nth-child(5) { animation-delay: 0.18s; }

  /* ══════════════════════════════════════════════════
     标签颜色
     ══════════════════════════════════════════════════ */
  .tag {
    display: inline-block;
    font-size: 0.64rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 1px 8px;
    border-radius: 100px;
    text-transform: uppercase;
  }
  .tag-cyan    { background: var(--cyan-dim);    color: var(--cyan); }
  .tag-purple  { background: var(--purple-dim);  color: var(--purple); }
  .tag-emerald { background: var(--emerald-dim); color: var(--emerald); }
  .tag-amber   { background: var(--amber-dim);   color: var(--amber); }
  .tag-rose    { background: var(--rose-dim);    color: var(--rose); }
</style>

// ══════════════════════════════════════════════════════
// 渲染
// ══════════════════════════════════════════════════════

function render() {
  // Stats
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = STATS.map(s => `
    <div class="stat-card">
      <div class="num" style="color:${s.color}">${s.num}</div>
      <div class="label">${s.label}</div>
    </div>
  `).join('');

  // MCP
  const mcpGrid = document.getElementById('mcpGrid');
  mcpGrid.innerHTML = MCPS.map(m => `
    <div class="mcp-card">
      <div class="mcp-icon">${m.icon}</div>
      <div class="mcp-body">
        <h3>${m.name}</h3>
        <div class="desc">${m.desc}</div>
        <div class="cmd">${m.cmd}</div>
      </div>
    </div>
  `).join('');

  // Skills categories
  const container = document.getElementById('skillsContainer');
  container.innerHTML = CATEGORIES.map((cat, ci) => `
    <div class="skill-category fade-in" data-category="${cat.name}">
      <div class="cat-header" onclick="toggleCat(this)">
        <span class="chevron">&#9654;</span>
        <span class="icon ${cat.color} tag-${cat.color}" style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-size:1rem;">${cat.emoji}</span>
        <h3>${cat.name}</h3>
        <span class="cat-count">${cat.items.length}</span>
      </div>
      <div class="cat-body open">
        <div class="skill-list" data-category="${cat.name}">
          ${cat.items.map(sk => `
            <div class="skill-item" data-name="${sk.name.toLowerCase()}" data-desc="${(sk.desc||'').toLowerCase()}">
              <div class="sk-name">
                <span class="tag tag-${cat.color}" style="margin-right:8px;vertical-align:middle;">${cat.name.slice(0,2)}</span>
                ${sk.name}
              </div>
              <div class="sk-desc">${sk.desc}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');

  // Footer time
  const now = new Date();
  const opts = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
  document.getElementById('footerTime').textContent = now.toLocaleDateString('zh-CN', opts);
}

// ══════════════════════════════════════════════════════
// 交互
// ══════════════════════════════════════════════════════

function toggleCat(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

function filterSkills() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const items = document.querySelectorAll('.skill-item');
  const cats = document.querySelectorAll('.skill-category');
  let totalVisible = 0;

  items.forEach(el => {
    const name = el.dataset.name || '';
    const desc = el.dataset.desc || '';
    const match = !q || name.includes(q) || desc.includes(q);
    el.style.display = match ? '' : 'none';
    if (match) totalVisible++;
  });

  cats.forEach(cat => {
    const visible = cat.querySelectorAll('.skill-item[style*="display: none"]').length === 0;
    const hasItems = cat.querySelectorAll('.skill-item').length > 0;
    const allHidden = cat.querySelectorAll('.skill-item[style*="display: none"]').length === cat.querySelectorAll('.skill-item').length;
    cat.style.display = allHidden && hasItems ? 'none' : '';
  });

  const empty = document.getElementById('emptyState');
  if (totalVisible === 0 && q) {
    empty.classList.add('show');
  } else {
    empty.classList.remove('show');
  }
}

document.addEventListener('DOMContentLoaded', render);
